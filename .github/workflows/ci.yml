name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build runtime staticlib
        # cargo test alone doesn't produce libklassic_runtime.a, which
        # the C-backend link tests resolve next to the klassic binary.
        run: cargo build -p klassic-runtime

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

  # Apple Silicon job. Beyond keeping the evaluator / REPL / C backend
  # honest on macOS, this runner is where the direct aarch64 Mach-O
  # backend's output is actually *executed*: the build-and-run tests
  # are cfg-gated to macOS + aarch64, so the generated machine code is
  # crash-checked here on every push. A guard test fails the job if the
  # runner ever stops being arm64 (which would silently skip them).
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show runner architecture
        run: uname -m  # must be arm64; the aarch64 backend executes here

      - name: Build runtime staticlib
        # cargo test alone doesn't produce libklassic_runtime.a, which
        # the C-backend link tests resolve next to the klassic binary.
        run: cargo build -p klassic-runtime

      - name: Test
        run: cargo test
