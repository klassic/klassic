# Tagging vX.Y.Z builds release binaries — a statically-linked Linux
# binary (musl, so it runs on any x86_64 Linux without a Rust
# toolchain) and macOS binaries for Apple Silicon and Intel — and
# attaches them to a GitHub Release. Keep Cargo.toml's `version` in
# sync with the tag so `klassic --version` matches the release.
name: Release

on:
  push:
    tags:
      - "v*"
  # Manual runs build and package without publishing — a dry run to
  # verify the toolchains before cutting a tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Test
        run: cargo test

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          cp target/x86_64-unknown-linux-musl/release/klassic klassic
          cp target/x86_64-unknown-linux-musl/release/libklassic_runtime.a libklassic_runtime.a
          tar czf "klassic-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz" klassic libklassic_runtime.a

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: klassic-*.tar.gz
          generate_release_notes: true

  # macOS: the evaluator, REPL, and C backend run on macOS as-is (the
  # direct ELF backend stays Linux-only). The arm64 runner also
  # cross-builds the Intel binary — Apple's toolchain links both.
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Test
        run: cargo test

      - name: Build binaries
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Package
        run: |
          cp target/aarch64-apple-darwin/release/klassic klassic
          cp target/aarch64-apple-darwin/release/libklassic_runtime.a libklassic_runtime.a
          tar czf "klassic-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" klassic libklassic_runtime.a
          cp target/x86_64-apple-darwin/release/klassic klassic
          cp target/x86_64-apple-darwin/release/libklassic_runtime.a libklassic_runtime.a
          tar czf "klassic-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz" klassic libklassic_runtime.a

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: klassic-*.tar.gz
          generate_release_notes: true
