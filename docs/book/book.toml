[book]
title = "The Klassic Book"
authors = ["Klassic contributors"]
description = "Statically typed object-functional programming language that compiles straight to native executables - ELF on Linux, signed Mach-O on Apple Silicon - with no external toolchain."
language = "en"
multilingual = false
src = "src"

[output.html]
git-repository-url = "https://github.com/klassic/klassic"
edit-url-template = "https://github.com/klassic/klassic/edit/main/docs/book/{path}"
default-theme = "light"
preferred-dark-theme = "ayu"
no-section-label = false
additional-css = ["theme/custom.css"]
fold = { enable = true, level = 1 }

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30

[output.html.playground]
runnable = false
